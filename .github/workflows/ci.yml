# CI quality gates. Runs on every PR and on main pushes.
#
# Scope notes:
# - The candle layer (backend/src/assets candle files, providers/kis/candles,
#   candle-related providers/binance files, realtime live-candle files, and
#   the candle smoke scripts) is a REQUIRED lint/format gate
#   (lint:candles:check / format:candles:check). The rest of the repository
#   has known pre-existing lint debt and is deliberately not gated yet.
# - Long real-provider smokes (Binance/KIS WebSocket+REST) are NEVER run in
#   CI; they are a manual runbook step (see
#   backend/docs/candle-live-operations.md). Only the fixture smoke — real
#   PostgreSQL + Redis with in-process fixture providers, no provider
#   credentials — runs here.
name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    name: Backend quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        run: npm install -g pnpm@10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml
      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile
      - name: Prisma generate
        # prisma.config.ts resolves the datasource url from env("DATABASE_URL")
        # while loading config, so `prisma generate` aborts when it is unset —
        # even though no database is contacted here. A syntactically valid,
        # non-secret placeholder satisfies the resolver; it is scoped to this
        # step so the rest of the Backend quality job never sees a DATABASE_URL
        # (this job has no PostgreSQL service and must not appear to have a DB).
        run: pnpm exec prisma generate
        env:
          DATABASE_URL: postgresql://prisma:prisma@localhost:5432/prisma?schema=public
      - name: Candle-layer lint (check only, no fix)
        run: pnpm run lint:candles:check
      - name: Candle-layer format check
        run: pnpm run format:candles:check
      - name: Production typecheck
        run: pnpm run typecheck
      - name: Build
        run: pnpm run build
      - name: Unit tests
        run: pnpm test

  frontend-quality:
    name: Frontend quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies (frozen lockfile)
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      # The Expo app defines no build script; `tsc --noEmit` is its compile
      # gate. No placeholder build command is fabricated here.
      - name: Tests (node --test, Node 24 type stripping)
        run: npm test

  limit-order-db-integration:
    name: Limit order PostgreSQL + Redis integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: trading_app
          POSTGRES_PASSWORD: trading_app_pw
          POSTGRES_DB: trading_app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trading_app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://trading_app:trading_app_pw@localhost:5432/trading_app?schema=public
      REDIS_URL: redis://localhost:6379
      # Opt-in switch for the limit-order suites that need a real database.
      LIMIT_ORDER_RESERVATION_DB_INTEGRATION: "1"
      LIMIT_ORDER_AUTO_EXECUTION_INTEGRATION: "1"
      LIMIT_ORDER_PHASE3_INTEGRATION: "1"
      # Event-boundary concurrency: two concurrent acquireSession() calls on
      # ONE service instance must serialize on a real advisory lock.
      LIMIT_ORDER_BOUNDARY_CONCURRENCY_INTEGRATION: "1"
      # Path-B durable checkpoint: a candle unprocessed for longer than the
      # lookback must still be processed, a candle STORED after the market-time
      # marker passed its window must still be processed (the storage-order
      # scan position), and a retention gap must be detected.
      LIMIT_ORDER_CANDLE_CHECKPOINT_INTEGRATION: "1"
      # Multi-instance shared readiness over a real Redis: cross-instance
      # agreement, the non-owner create readiness path (proof issued before the
      # transaction, re-verified inside it), and owner fencing.
      LIMIT_ORDER_SHARED_READINESS_INTEGRATION: "1"
      # End-to-end matcher (XADD -> XACK). Reduced volume; only
      # hardware-independent invariants are asserted, never a throughput rate.
      LIMIT_ORDER_MATCHER_E2E_INTEGRATION: "1"
      ORDER_EXECUTE_DB_INTEGRATION: "1"
      FX_EXECUTE_DB_INTEGRATION: "1"
      MVP_FLOW_DB_SMOKE: "1"
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        run: npm install -g pnpm@10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml
      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile
      - name: Prisma generate
        run: pnpm exec prisma generate
      # Also proves every migration — including the additive path-A event,
      # evidence, worker-trigger, and FIFO-index migrations — applies cleanly
      # to a fresh database.
      - name: Apply migrations
        run: pnpm exec prisma migrate deploy
      - name: Verify migrations are fully applied
        run: pnpm exec prisma migrate status
      # Reservation atomicity, deterministic lock interleavings, post-lock DB
      # time boundaries, the live-trade Redis Stream matcher (path A: pending
      # recovery, leader takeover, accounting, event dedupe, stream-ID
      # ordering under clock skew), and phase 3 (event-boundary mutex in both
      # interleavings, path-B confirmed-candle matching, A/B and lifecycle
      # races, health gate, and a reduced synthetic PUBLISHER throughput
      # sweep), plus the hardening suites: event-boundary concurrency
      # (session-per-lease, proven through pg_locks), the path-B durable
      # checkpoint including its STORAGE-order scan position (a candle stored
      # after the market-time marker passed its window is still swept) and
      # retention-gap detection, cross-instance shared readiness over Redis
      # (the non-owner create readiness path and owner fencing), and the
      # END-TO-END matcher path (XADD to XACK, which is a different and much
      # lower number than publisher XADD throughput and must never be quoted
      # for it; CI gates the arithmetic, never the rate).
      - name: Limit order PostgreSQL + Redis integration tests
        run: >-
          pnpm exec jest --runInBand
          src/orders/limit-order-reservation.integration.spec.ts
          src/orders/limit-order-create-race.integration.spec.ts
          src/orders/limit-order-transaction-time.integration.spec.ts
          src/orders/limit-order-auto-execution.integration.spec.ts
          src/orders/limit-order-phase3.integration.spec.ts
          src/orders/limit-matching/limit-order-boundary-concurrency.integration.spec.ts
          src/orders/limit-matching/limit-order-candle-checkpoint.integration.spec.ts
          src/orders/limit-matching/limit-order-matcher-e2e.integration.spec.ts
          src/providers/provider-trade-readiness.integration.spec.ts
          src/orders/orders.execute.integration.spec.ts
          src/fx/fx.execute.integration.spec.ts
          src/mvp-flow.integration.spec.ts

  candle-fixture-integration:
    name: Candle fixture integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: trading_app
          POSTGRES_PASSWORD: trading_app_pw
          POSTGRES_DB: trading_app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trading_app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://trading_app:trading_app_pw@localhost:5432/trading_app?schema=public
      REDIS_URL: redis://localhost:6379
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        run: npm install -g pnpm@10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml
      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile
      - name: Prisma generate
        run: pnpm exec prisma generate
      - name: Apply migrations
        run: pnpm exec prisma migrate deploy
      # Record the fixture artifacts that already exist at checkout (historical
      # results committed to the repo). This run's artifact is identified later
      # as the set difference — never by modification time, which cannot tell a
      # freshly checked-out historical file apart from one written just now.
      - name: Snapshot pre-existing fixture artifacts
        run: |
          shopt -s nullglob
          : > "$RUNNER_TEMP/pre-fixtures.txt"
          for f in artifacts/candle-smoke/fixture-*.json; do
            basename "$f" >> "$RUNNER_TEMP/pre-fixtures.txt"
          done
          echo "pre-existing fixture artifacts at checkout:"
          cat "$RUNNER_TEMP/pre-fixtures.txt"
      - name: Run release fixture smoke (no provider credentials)
        run: CANDLE_PIPELINE_RELEASE_FIXTURE_SMOKE=1 pnpm run smoke:candle-fixture
      # Path-B candle eligibility against real canonical closed 5m rows written
      # by the fixture pipeline: confirmed candle accepted, incomplete/open
      # candle excluded, evidence recorded, executed price = limit price.
      - name: Path-B candle eligibility fixture checks
        run: >-
          LIMIT_ORDER_AUTO_EXECUTION_ENABLED=true
          LIMIT_ORDER_CANDLE_RECONCILIATION_ENABLED=true
          LIMIT_ORDER_CANDLE_FIXTURE_SMOKE=1
          pnpm run smoke:limit-order-candle-fixture
      # Identify exactly the fixture JSON this run produced (files not present at
      # checkout). Runs on success and failure so a smoke that wrote a report
      # before failing still yields one debuggable file — but never falls back
      # to a historical artifact, and never masks the smoke's own exit status.
      - name: Identify this run's fixture artifact
        id: fixture
        if: always()
        run: |
          shopt -s nullglob
          new=""
          for f in artifacts/candle-smoke/fixture-*.json; do
            name="$(basename "$f")"
            if grep -qxF "$name" "$RUNNER_TEMP/pre-fixtures.txt" 2>/dev/null; then
              continue
            fi
            if [ -n "$new" ]; then
              echo "more than one new fixture artifact appeared this run: $new and $f" >&2
              exit 1
            fi
            new="$f"
          done
          if [ -z "$new" ]; then
            echo "no new fixture artifact was produced this run; nothing to upload"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "this run's fixture artifact: $new"
          echo "found=true" >> "$GITHUB_OUTPUT"
          # relpath is backend-relative (run steps default to working-directory:
          # backend); path is repo-root-relative for upload-artifact, whose
          # action step does NOT honor defaults.run.working-directory.
          echo "relpath=$new" >> "$GITHUB_OUTPUT"
          echo "path=backend/$new" >> "$GITHUB_OUTPUT"
      # Release gate: only reached when the smoke itself passed. Asserts the one
      # file this run produced proves the checked-out commit, a clean tree, and
      # a passed result. A failed smoke skips this step (its exit status wins).
      - name: Verify artifact commit traceability
        run: |
          rel="${{ steps.fixture.outputs.relpath }}"
          if [ -z "$rel" ]; then
            echo "no fixture artifact produced this run to verify" >&2
            exit 1
          fi
          echo "verifying $rel"
          jq -e --arg sha "$GITHUB_SHA" \
            '.gitCommit == $sha and .gitDirty == false and .result == "passed"' \
            "$rel"
      - name: Upload this run's fixture artifact (kept on failure too)
        if: always() && steps.fixture.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: candle-fixture-smoke
          path: ${{ steps.fixture.outputs.path }}
          if-no-files-found: error
